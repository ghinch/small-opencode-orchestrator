version: "3.8"
name: opencode-sandbox

# -- OpenCode + Agent Vault — container orchestration (Apple Container) --
#
# ⚠ container-compose was found to be buggy (env_file not loaded,
#   naming mismatch, silent container failures). See scripts/start.sh
#   and scripts/stop.sh which use `container run` directly.
#
# This file documents the intended architecture; it is NOT used at
# runtime. To start:  source .env && ./scripts/start.sh
#
# Key differences from Docker Compose:
#   - Images need docker.io/ prefix (e.g. docker.io/library/node:22-slim)
#   - No `${VAR:-default}` expansion — use env_file or hardcoded values
#   - environment must be mapping format (KEY: value), not list (- KEY=value)
#
# Architecture:

networks:
  internal:
    # Apple Container vmnet network — containers resolve each other
    # by service name (agent-vault, token-refresher, opencode-server).

volumes:
  agent-vault-data:
  opencode-home:

services:
  # ── Agent Vault: credential proxy server ──
  agent-vault:
    image: docker.io/infisical/agent-vault:0.20.1
    networks:
      - internal
    ports:
      - "14321:14321"
      - "14322:14322"
    volumes:
      - agent-vault-data:/data
    environment:
      AGENT_VAULT_MASTER_PASSWORD: test123
      AGENT_VAULT_DATA_DIR: /data

  # ── Token Refresher: OAuth access token lifecycle ──
  token-refresher:
    image: docker.io/infisical/agent-vault:0.20.1
    user: root
    networks:
      - internal
    entrypoint: ["/bin/sh", "-c"]
    command: |
      apk add --no-cache jq curl >&2

      echo "${AGENT_VAULT_PASSWORD}" | agent-vault auth login \
        --address "${AGENT_VAULT_ADDR}" \
        --email "${AGENT_VAULT_EMAIL}" \
        --password-stdin || {
        echo "[refresher] FATAL: admin login failed" >&2
        exit 1
      }

      echo "[refresher] starting OAuth token refresh loop (every 15 min)..."
      while true; do
        /scripts/refresh-oauth-tokens.sh || echo "[refresher] refresh cycle had errors — will retry" >&2
        sleep 900
      done
    volumes:
      - ./scripts/refresh-oauth-tokens.sh:/scripts/refresh-oauth-tokens.sh:ro
    env_file:
      - .env
    environment:
      AGENT_VAULT_ADDR: http://agent-vault:14321
    depends_on:
      - agent-vault

  # ── OpenCode: headless API server ──
  opencode:
    build:
      context: .
      dockerfile: Dockerfile.opencode
    image: opencode-sandbox:latest
    networks:
      - internal
    ports:
      - "127.0.0.1:4096:4096"
    volumes:
      - .:/workspace
      - ${HOME}/.config/opencode:/home/opencode/.config/opencode:ro
      - opencode-home:/home/opencode
      - ${HOME}/.config/opencode/agent-token:/token:ro
    env_file:
      - .env
    environment:
      AGENT_VAULT_ADDR: http://agent-vault:14321
      AGENT_VAULT_TOKEN_FILE: /token/agent-token
      # Dummy credentials — agent-vault injects real ones at proxy time
      GEMINI_API_KEY: __gemini_api_key__
      OPENAI_API_KEY: __openai_api_key__
      GITHUB_TOKEN: __github_token__
      ANTHROPIC_API_KEY: __anthropic_api_key__
    working_dir: /workspace
    command: /usr/local/bin/opencode-entrypoint.sh
    depends_on:
      - agent-vault
    stdin_open: true
    tty: true
